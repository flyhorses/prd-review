services:
  # =========================================
  # 1. PostgreSQL 数据库服务
  # =========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-prd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================
  # 2. Redis 缓存与消息队列服务
  # =========================================
  redis:
    image: redis:7
    container_name: prd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================
  # 3. MinIO 对象存储服务
  # =========================================
  minio:
    image: minio/minio
    container_name: prd-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================
  # 4. MinIO 初始化任务
  # =========================================
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${APP_STORAGE_BUCKET:-prd};
      /usr/bin/mc anonymous set public myminio/${APP_STORAGE_BUCKET:-prd};
      exit 0;
      "

  # =========================================
  # 5. 后端应用服务 (Spring Boot)
  # =========================================
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: prd-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-prd}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_STORAGE_ENDPOINT: http://minio:9000
      APP_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APP_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET:-prd}
      APP_STORAGE_REGION: ${APP_STORAGE_REGION:-us-east-1}
      AI_BAILIAN_API_KEY: ${AI_BAILIAN_API_KEY:-sk-b272c77a07184f6ca327667eae5164e7}
      AI_MODEL: ${AI_MODEL:-qwen-plus}
      APP_AI_STRUCTURED_MAX_ATTEMPTS: ${APP_AI_STRUCTURED_MAX_ATTEMPTS:-2}
      APP_AI_STRUCTURED_INCLUDE_LAST_ERROR: ${APP_AI_STRUCTURED_INCLUDE_LAST_ERROR:-true}
      APP_PRD_MAX_CONTENT_LENGTH: ${APP_PRD_MAX_CONTENT_LENGTH:-100000}
      APP_PRD_DEFAULT_DETAIL_LEVEL: ${APP_PRD_DEFAULT_DETAIL_LEVEL:-BASIC}
    ports:
      - "8080:8080"

  # =========================================
  # 6. 前端应用服务 (React + Nginx)
  # =========================================
  frontend:
    build: ./frontend
    container_name: prd-frontend
    depends_on:
      - app
    ports:
      - "80:80"

# =========================================
# 数据卷
# =========================================
volumes:
  postgres_data:
  redis_data:
  minio_data:
